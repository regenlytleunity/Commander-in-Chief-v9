function signedM(n) { return (n >= 0 ? "+" : "") + DOLLAR + n + "M"; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function expScale(val, base) { return base * Math.pow(1.025, val); }

// Diminishing returns: as stat approaches threshold, penalties shrink
// At threshold buffer zone (within 15 of GO), penalties reduced up to 70%
function diminish(penalty, currentStat, threshold) {
  if (penalty >= 0) return penalty; // only diminish negatives
  var buffer = 15;
  var distFromDeath = currentStat - threshold;
  if (distFromDeath >= buffer) return penalty; // far from death, full penalty
  if (distFromDeath <= 0) return Math.round(penalty * 0.3); // at/past threshold, 70% reduction
  var pct = distFromDeath / buffer; // 0 to 1
  var reduction = 0.3 + 0.7 * pct; // 0.3 to 1.0
  return Math.round(penalty * reduction);
}

// Shuffle array helper
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

  { id: "wilson_neutrality", year: 1914, duration: "short", title: "Wilson and the Great War", desc: "War erupts across Europe. President Wilson, an academic who never wanted this, declares American neutrality. But both sides want American support — and American trade is enormously profitable.", termDef: "Woodrow Wilson: President of the United States during WWI, isolationist, wanted to avoid war.", choices: [

  { id: "fdr_good_neighbor", year: 1933, duration: "long", title: "FDR's Good Neighbor Policy", desc: "President Roosevelt declares a 'Good Neighbor Policy' toward Latin America. No more Platt Amendments, no more invasions. Can America lead the hemisphere through respect instead of force?", termDef: "Good Neighbor Policy: FDR's policy of non-intervention and non-interference in the domestic affairs of Latin America.", choices: [
    { text: "Full Good Neighbor \u2014 repeal Platt, lose bases", dom: -5, intl: 18, pwr: -10, gold: 5, nations: { cuba: 22, mexico: 18, panama: 12 }, policies: ["Good Neighbor"], cost: 8 },
    { text: "Soften approach but secretly keep bases", dom: -3, intl: -5, pwr: 5, gold: -5, nations: { cuba: -3, mexico: 5, panama: -3 }, policies: ["Shadow Bases"], cost: 12 },
    { text: "Double down on control \u2014 hemisphere hates us", dom: 5, intl: -15, pwr: 10, gold: 5, nations: { cuba: -12, mexico: -18, panama: -8 }, policies: [], cost: 0 },
    { text: "Trade deals instead of military presence", dom: 3, intl: 10, pwr: -5, gold: 8, nations: { cuba: 10, mexico: 12, panama: 8 }, policies: ["Trade Over Arms"], cost: 10 },
    { text: "Create a Pan-American mutual defense pact", dom: 5, intl: 5, pwr: 8, gold: -10, nations: { cuba: 8, mexico: 8, panama: 5 }, policies: ["Pan-Am Defense"], cost: 20 },
    { text: "Withdraw from everything \u2014 total disengagement", dom: -8, intl: 8, pwr: -15, gold: 10, nations: { cuba: 15, mexico: 15, panama: 10, britain: -5 }, policies: [], cost: 0 },
  ]},
  { id: "neutrality_acts", year: 1935, duration: "short", title: "The Neutrality Acts", desc: "With fascism rising in Europe, Congress passes the Neutrality Acts prohibiting arms sales to warring nations. The memory of WWI's trenches is still fresh in the nation's mind.", termDef: "Neutrality Acts: Laws designed to keep the U.S. out of future wars by banning arms sales to warring nations (1935-37).", choices: [
    { text: "Support the Acts \u2014 handcuff yourself for war", dom: 12, intl: -10, pwr: -10, gold: 8, nations: { britain: -12, france: -12, germany: 5 }, policies: ["Neutrality Acts"], cost: 0 },
    { text: "Sign but secretly rearm \u2014 expensive deception", dom: -5, intl: -3, pwr: 6, gold: -12, nations: { germany: -5 }, policies: ["Secret Rearmament"], cost: 30 },
    { text: "Oppose openly \u2014 political suicide at home", dom: -15, intl: 8, pwr: 8, gold: -5, nations: { britain: 12, france: 12, germany: -12 }, policies: [], cost: 8 },
    { text: "Pass them with a sunset clause \u2014 revisit in 2 years", dom: 5, intl: -3, pwr: -3, gold: 3, nations: { britain: -5, france: -5 }, policies: ["Sunset Neutrality"], cost: 3 },
    { text: "Include humanitarian aid exceptions", dom: 3, intl: 5, pwr: -5, gold: -5, nations: { britain: 3, france: 3 }, policies: ["Humanitarian Exception"], cost: 8 },
    { text: "Ban all foreign involvement including trade", dom: 10, intl: -15, pwr: -8, gold: -8, nations: { britain: -15, france: -15, germany: 3 }, policies: ["Total Isolation"], cost: 0 },
  ]},
  { id: "hitler_poland", year: 1939, duration: "instant", title: "Hitler Invades Poland", desc: "Germany blitzes into Poland. Britain and France declare war. World War II has begun. America watches from across the Atlantic as the Neutrality Acts bind your hands.", termDef: "Start of the US/Soviet nuclear arms race: Soviets test their first nuclear bomb.", choices: [
    { text: "Maintain neutrality \u2014 watch democracy fall", dom: 8, intl: -10, pwr: -6, gold: 8, nations: { britain: -18, france: -18, germany: 5 }, policies: [], cost: 0 },
    { text: "Allow Cash and Carry \u2014 profit, anger Germany", dom: -5, intl: -5, pwr: 8, gold: 8, nations: { britain: 8, france: 8, germany: -18 }, policies: ["Cash and Carry"], cost: 5 },
    { text: "Secret military planning \u2014 risk exposure", dom: -10, intl: 6, pwr: 8, gold: -12, nations: { britain: 18, france: 18, germany: -22 }, policies: ["Secret Alliance"], cost: 22 },
    { text: "Publicly condemn Germany and rally democracies", dom: 5, intl: 5, pwr: -3, gold: -3, nations: { britain: 10, france: 10, germany: -15 }, policies: [], cost: 5 },
    { text: "Begin evacuating American citizens from Europe", dom: 8, intl: -3, pwr: -5, gold: -8, nations: { britain: -3, france: -3 }, policies: [], cost: 12 },
    { text: "Offer to host peace negotiations", dom: -3, intl: 10, pwr: -8, gold: -5, nations: { britain: -3, germany: -8 }, policies: ["Peace Broker"], cost: 8 },
  ]},
  { id: "cash_and_carry", year: 1939, duration: "short", title: "Cash and Carry Policy", desc: "The Cash and Carry policy allows belligerent nations to buy American goods — but they must pay cash and transport everything themselves. It technically maintains neutrality while helping whoever controls the seas.", termDef: "Cash and Carry: A loophole in the Neutrality Acts, allowed the U.S. to sell supplies to Britain if they paid in cash and transported them on their own ships (1939).", choices: [
    { text: "Cash and Carry for Allies only", dom: -5, intl: -6, pwr: 8, gold: 12, nations: { britain: 12, france: 8, germany: -18, japan: -8 }, policies: ["Cash and Carry"], cost: 0 },
    { text: "Sell to anyone \u2014 arm both sides", dom: -8, intl: -10, pwr: 5, gold: 22, nations: { germany: 5, japan: 5, britain: -8 }, policies: [], cost: 0 },
    { text: "No sales \u2014 moral high ground, empty pockets", dom: 6, intl: -6, pwr: -10, gold: -12, nations: { britain: -12, france: -8, germany: -3 }, policies: [], cost: 0 },
    { text: "Sell food and medicine only \u2014 not weapons", dom: 3, intl: 5, pwr: -5, gold: 5, nations: { britain: 3, france: 3, germany: -3 }, policies: ["Humanitarian Trade"], cost: 0 },
    { text: "Cash and Carry with massive markup for profit", dom: -5, intl: -8, pwr: 3, gold: 25, nations: { britain: -3, france: -3, germany: -10 }, policies: [], cost: 0 },
    { text: "Sell to Allies on credit \u2014 they'll owe us", dom: -3, intl: -3, pwr: 10, gold: 15, nations: { britain: 15, france: 10, germany: -20 }, policies: ["War Loans"], cost: 0 },
  ]},
  { id: "lend_lease", year: 1941, duration: "short", title: "The Lend-Lease Act", desc: "Britain is running out of money and weapons. FDR proposes 'lending' military equipment to the Allies — like lending your neighbor a garden hose when their house is on fire.", termDef: "Lend-Lease Program: A policy where the U.S. loaned weapons and supplies to Britain (1941).", choices: [
    { text: "Full Lend-Lease \u2014 Arsenal of Democracy", dom: -6, intl: 10, pwr: 12, gold: -22, nations: { britain: 22, france: 8, russia: 12, germany: -18, japan: -12 }, policies: ["Lend-Lease"], cost: 80 },
    { text: "Britain only \u2014 abandon Soviets", dom: -5, intl: -5, pwr: 8, gold: -8, nations: { britain: 18, russia: -12, germany: -8 }, policies: ["Limited Lend-Lease"], cost: 40 },
    { text: "Reject \u2014 let Britain fall", dom: 8, intl: -15, pwr: -6, gold: 8, nations: { britain: -22, france: -8, germany: 8 }, policies: [], cost: 0 },
    { text: "Lend-Lease to everyone fighting the Axis", dom: -8, intl: 12, pwr: 15, gold: -28, nations: { britain: 22, france: 10, russia: 18, china: 10, germany: -20, japan: -15 }, policies: ["Global Arsenal"], cost: 95 },
    { text: "Sell equipment at cost \u2014 not free, not profiteering", dom: 3, intl: -3, pwr: 8, gold: 5, nations: { britain: 10, russia: 5, germany: -10 }, policies: ["Arms Sales"], cost: 20 },
    { text: "Lend-Lease with strings \u2014 demand post-war concessions", dom: 5, intl: -8, pwr: 10, gold: -10, nations: { britain: 5, russia: -3, germany: -12 }, policies: ["Strategic Lend-Lease"], cost: 50 },
  ]},
  { id: "pearl_harbor", year: 1941, duration: "instant", title: "Bombing of Pearl Harbor", desc: "December 7, 1941. Japanese planes appear over Pearl Harbor, Hawaii. Battleships burn. 2,403 Americans die in the surprise attack. The age of isolationism ends in fire and smoke.", termDef: "Pearl Harbor: Hawaii base that was bombed by Japan on December 7, 1941, caused America to join the war.", choices: [
    { text: "Total war \u2014 Japan AND Germany", dom: 18, intl: -5, pwr: 22, gold: -28, nations: { japan: -45, germany: -35, britain: 25, france: 18, russia: 18, china: 18 }, policies: ["Total War"], cost: 100 },
    { text: "War on Japan only \u2014 ignore Europe", dom: -5, intl: -8, pwr: 12, gold: -12, nations: { japan: -45, britain: -8, france: -8 }, policies: [], cost: 50 },
    { text: "Demand surrender first \u2014 nation screams for blood", dom: -18, intl: -8, pwr: -8, gold: 5, nations: { japan: 5, britain: -22, china: -12 }, policies: [], cost: 0 },
    { text: "Declare war and immediately invoke all alliances", dom: 15, intl: 5, pwr: 18, gold: -22, nations: { japan: -45, germany: -30, britain: 25, russia: 15, china: 15 }, policies: ["Allied War"], cost: 85 },
    { text: "War on Japan, prepare for Germany but don't declare yet", dom: 5, intl: -3, pwr: 15, gold: -15, nations: { japan: -45, britain: 5, germany: -10 }, policies: ["Pacific First"], cost: 60 },
    { text: "Nuclear response research \u2014 invest in secret weapons", dom: 3, intl: -5, pwr: 20, gold: -25, nations: { japan: -35, britain: 5, germany: -5 }, policies: ["Manhattan Project"], cost: 80 },
  ]},
  { id: "fdr_radio", year: 1941, duration: "instant", title: "FDR's 'Day of Infamy' Address", desc: "December 8th. President Roosevelt addresses Congress and the nation by radio. The entire world listens. The words spoken today will echo through history.", termDef: "Hiroshima + Nagasaki: Japanese cities bombed by the US at the end of WWII.", choices: [
    { text: "'A date which will live in infamy' \u2014 total commitment", dom: 18, intl: -5, pwr: 12, gold: -5, nations: { britain: 12, france: 8, russia: 8, china: 8, japan: -12 }, policies: [], cost: 5 },
    { text: "Cold strategic briefing \u2014 uninspiring but precise", dom: -6, intl: -3, pwr: 8, gold: 0, nations: { britain: -3 }, policies: [], cost: 0 },
    { text: "Emphasize peace \u2014 confuse a nation wanting revenge", dom: -10, intl: 10, pwr: -6, gold: 0, nations: { japan: 5, britain: -8, china: -5 }, policies: ["Peace-First"], cost: 0 },
    { text: "Promise to liberate all occupied nations", dom: 12, intl: 8, pwr: -3, gold: -8, nations: { britain: 10, france: 12, china: 10, japan: -8 }, policies: ["Liberation Pledge"], cost: 10 },
    { text: "Focus on unity at home \u2014 domestic strength first", dom: 15, intl: -5, pwr: 5, gold: 0, nations: { britain: -3 }, policies: [], cost: 0 },
    { text: "Announce a full war economy mobilization", dom: 8, intl: -3, pwr: 15, gold: -12, nations: { japan: -8, germany: -5, britain: 5 }, policies: ["War Economy"], cost: 15 },
  ]},
  { id: "midway", year: 1942, duration: "instant", title: "Battle of Midway", desc: "Six months after Pearl Harbor, the US Navy intercepts the Japanese fleet near Midway Atoll. American codebreakers have cracked Japan's plans. This could be the turning point of the Pacific war.", termDef: "Battle of Midway: Turning point in the pacific war, US victory over Japan.", choices: [
    { text: "Spring the ambush \u2014 full carrier assault", dom: 12, intl: -3, pwr: 18, gold: -15, nations: { japan: -18, britain: 8 }, policies: [], cost: 40 },
    { text: "Play it safe \u2014 defensive positioning only", dom: -5, intl: 3, pwr: 5, gold: -5, nations: { japan: -5, britain: -3 }, policies: [], cost: 15 },
    { text: "Send submarines first \u2014 test their strength", dom: -3, intl: -3, pwr: 8, gold: -8, nations: { japan: -10, britain: 3 }, policies: [], cost: 20 },
    { text: "Call for allied fleet support from Australia", dom: -5, intl: 8, pwr: 10, gold: -10, nations: { japan: -12, britain: 12 }, policies: ["Allied Fleet"], cost: 25 },
    { text: "Bypass Midway \u2014 strike Japanese supply lines", dom: -8, intl: -5, pwr: 12, gold: -5, nations: { japan: -8 }, policies: [], cost: 18 },
    { text: "Use the intel to negotiate a ceasefire", dom: -12, intl: 12, pwr: -8, gold: 5, nations: { japan: 5, britain: -10 }, policies: [], cost: 0 },
  ]},
  { id: "stalingrad", year: 1943, duration: "instant", title: "Battle of Stalingrad", desc: "The Soviets have trapped an entire German army at Stalingrad. Hitler refuses to allow retreat. The Eastern Front is turning. How should America respond to this shift in the war?", termDef: "Stalingrad: Russian city where soviets trapped the Germans, turning point in the war.", choices: [
    { text: "Increase Lend-Lease aid to the Soviets", dom: -5, intl: 8, pwr: 5, gold: -12, nations: { russia: 15, britain: 3, germany: -5 }, policies: [], cost: 25 },
    { text: "Push for a second front in Europe now", dom: 8, intl: 5, pwr: 12, gold: -15, nations: { russia: 8, britain: 10, germany: -12 }, policies: [], cost: 35 },
    { text: "Focus on the Pacific \u2014 let Soviets handle Europe", dom: 5, intl: -8, pwr: 8, gold: -5, nations: { russia: -10, japan: -8, britain: -5 }, policies: [], cost: 15 },
    { text: "Begin planning for post-war Europe", dom: -3, intl: 10, pwr: -3, gold: -5, nations: { russia: -3, britain: 8 }, policies: ["Post-War Planning"], cost: 10 },
    { text: "Use momentum to demand German surrender terms", dom: 5, intl: -5, pwr: 5, gold: 0, nations: { germany: -8, russia: 3 }, policies: [], cost: 5 },
    { text: "Send military advisors to the Eastern Front", dom: -3, intl: 5, pwr: 8, gold: -8, nations: { russia: 10, germany: -5 }, policies: [], cost: 18 },
  ]},
  { id: "d_day", year: 1944, duration: "instant", title: "D-Day: Invasion of Normandy", desc: "June 6, 1944. The largest amphibious invasion in history. Thousands of ships, planes, and soldiers prepare to storm the beaches of Nazi-occupied France. The fate of Europe hangs in the balance.", termDef: "D-Day: US, British, and French invasion of occupied France on June 6, 1944.", choices: [
    { text: "Full assault at Normandy \u2014 everything we have", dom: 15, intl: 5, pwr: 15, gold: -20, nations: { britain: 15, france: 18, germany: -20 }, policies: [], cost: 60 },
    { text: "Smaller diversionary attack first", dom: -3, intl: -3, pwr: 8, gold: -10, nations: { britain: 5, france: 5, germany: -8 }, policies: [], cost: 30 },
    { text: "Demand Soviet simultaneous offensive", dom: -5, intl: 5, pwr: 10, gold: -12, nations: { russia: 5, britain: 8, germany: -12 }, policies: [], cost: 35 },
    { text: "Delay until air superiority is guaranteed", dom: -8, intl: -5, pwr: 5, gold: -5, nations: { britain: -8, france: -10 }, policies: [], cost: 15 },
    { text: "Invade through Italy instead \u2014 softer target", dom: -5, intl: -3, pwr: 8, gold: -10, nations: { britain: 3, france: -8, germany: -5 }, policies: [], cost: 25 },
    { text: "Focus on strategic bombing \u2014 skip the beaches", dom: 5, intl: -8, pwr: 12, gold: -15, nations: { germany: -15, britain: -5, france: -12 }, policies: ["Bombing Campaign"], cost: 40 },
  ]},
  { id: "island_hopping", year: 1944, duration: "short", title: "Island Hopping Campaign", desc: "The US military adopts a bold Pacific strategy: skip heavily fortified islands, capture strategic ones, and use them as stepping stones toward Japan. Each island costs lives but brings victory closer.", termDef: "Island Hopping: The U.S. Pacific strategy of capturing strategic islands to use as bases for the next attack.", choices: [
    { text: "Full island hopping \u2014 leapfrog to Tokyo", dom: 10, intl: -5, pwr: 15, gold: -15, nations: { japan: -20, britain: 5 }, policies: ["Island Hopping"], cost: 45 },
    { text: "Slower, methodical advance \u2014 clear every island", dom: -5, intl: 3, pwr: 8, gold: -20, nations: { japan: -12 }, policies: [], cost: 55 },
    { text: "Focus on naval blockade instead", dom: -3, intl: 5, pwr: 5, gold: -8, nations: { japan: -8, britain: 3 }, policies: ["Naval Blockade"], cost: 20 },
    { text: "Prioritize submarine warfare against supply lines", dom: -3, intl: -5, pwr: 10, gold: -5, nations: { japan: -10 }, policies: [], cost: 15 },
    { text: "Push for Philippines liberation first", dom: 8, intl: 5, pwr: 8, gold: -12, nations: { japan: -8, philippines: 12 }, policies: [], cost: 30 },
    { text: "Offer Japan conditional surrender terms", dom: -10, intl: 12, pwr: -8, gold: 5, nations: { japan: 8, britain: -5, russia: -3 }, policies: [], cost: 0 },
  ]},
  { id: "manhattan_project", year: 1945, duration: "instant", title: "The Manhattan Project", desc: "The top-secret program has succeeded. America has built the world's first atomic bombs. The power to destroy entire cities now rests in your hands. Japan fights on. The Soviets are watching.", termDef: "Manhattan Project: The top-secret U.S. program to develop the atomic bomb.", choices: [
    { text: "Drop the bombs on Japan \u2014 end the war now", dom: 12, intl: -15, pwr: 20, gold: -5, nations: { japan: -35, russia: -12, britain: 5 }, policies: ["Nuclear Power"], cost: 10 },
    { text: "Demonstrate the bomb on an empty island first", dom: -5, intl: 8, pwr: 12, gold: -8, nations: { japan: -8, russia: -5, britain: 5 }, policies: [], cost: 15 },
    { text: "Keep the bomb secret \u2014 conventional invasion instead", dom: -10, intl: 5, pwr: -5, gold: -20, nations: { japan: -12, russia: 5, britain: -3 }, policies: [], cost: 50 },
    { text: "Share nuclear technology with allies", dom: -8, intl: 12, pwr: -3, gold: -10, nations: { russia: 8, britain: 12 }, policies: ["Nuclear Sharing"], cost: 20 },
    { text: "Use the threat to force Japanese surrender terms", dom: 5, intl: 3, pwr: 15, gold: 0, nations: { japan: -15, russia: -8 }, policies: [], cost: 5 },
    { text: "Stockpile the bombs \u2014 leverage for post-war dominance", dom: 5, intl: -10, pwr: 18, gold: -12, nations: { russia: -15, britain: -5 }, policies: ["Nuclear Stockpile"], cost: 25 },
  ]},
  { id: "atomic_bombs", year: 1945, duration: "instant", title: "Fat Man and Little Boy", desc: "Two atomic bombs are ready. Little Boy, a uranium bomb, and Fat Man, a plutonium bomb. Hiroshima and Nagasaki are the targets. The decision will define the atomic age and haunt history forever.", termDef: "Fat Man: Larger US nuclear bomb used to devastate Nagasaki.", choices: [
    { text: "Drop both \u2014 Hiroshima and Nagasaki", dom: 10, intl: -18, pwr: 18, gold: 5, nations: { japan: -35, russia: -15, britain: -3 }, policies: [], cost: 5 },
    { text: "Drop Little Boy only \u2014 give Japan time to surrender", dom: 5, intl: -8, pwr: 12, gold: 0, nations: { japan: -20, russia: -8 }, policies: [], cost: 3 },
    { text: "Offer final surrender terms before dropping", dom: -3, intl: 8, pwr: 8, gold: 0, nations: { japan: -10, russia: -3, britain: 5 }, policies: [], cost: 0 },
    { text: "Target military bases instead of cities", dom: -5, intl: 5, pwr: 10, gold: -5, nations: { japan: -15, russia: -5 }, policies: [], cost: 8 },
    { text: "Refuse to use them \u2014 continue firebombing", dom: -8, intl: 5, pwr: -5, gold: -15, nations: { japan: -5, russia: 8 }, policies: [], cost: 30 },
    { text: "Use one as a demonstration, keep the other as deterrent", dom: -3, intl: 10, pwr: 15, gold: -3, nations: { japan: -12, russia: -10, britain: 5 }, policies: ["Nuclear Deterrent"], cost: 5 },
  ]},
  { id: "kennan_telegram", year: 1946, duration: "instant", title: "Kennan's Long Telegram", desc: "George Kennan, a US diplomat in Moscow, sends an 8,000-word telegram warning that the Soviet Union is inherently expansionist and cannot be trusted. His analysis will reshape American foreign policy.", termDef: "Kennan's Long Telegram: A message from a U.S. diplomat in Moscow stating the Soviets were aggressive and untrustworthy (1946).", choices: [
    { text: "Adopt containment as official policy", dom: 5, intl: -8, pwr: 12, gold: -10, nations: { russia: -18, britain: 10, france: 5 }, policies: ["Containment"], cost: 15 },
    { text: "Dismiss it \u2014 maintain wartime alliance with Soviets", dom: -5, intl: 8, pwr: -5, gold: 5, nations: { russia: 10, britain: -8 }, policies: [], cost: 0 },
    { text: "Classify it and quietly prepare", dom: -3, intl: -3, pwr: 8, gold: -5, nations: { russia: -5 }, policies: ["Quiet Prep"], cost: 8 },
    { text: "Share the analysis with European allies", dom: -3, intl: 10, pwr: 5, gold: -5, nations: { russia: -12, britain: 12, france: 10 }, policies: [], cost: 10 },
    { text: "Confront the Soviets directly with the accusations", dom: 8, intl: -12, pwr: 8, gold: 0, nations: { russia: -22, britain: 5 }, policies: [], cost: 5 },
    { text: "Focus on economic rebuilding, not Soviet threats", dom: 10, intl: 5, pwr: -8, gold: -8, nations: { russia: 3, britain: 5, france: 8 }, policies: ["Rebuild First"], cost: 12 },
  ]},
  { id: "truman_doctrine", year: 1947, duration: "long", title: "The Truman Doctrine", desc: "Greece and Turkey are under Soviet pressure. President Truman asks Congress to provide aid to any nation fighting communism. This would officially end isolationism and commit America to global intervention.", termDef: "Truman Doctrine: The U.S. promise to provide aid to any nation fighting against Communism, declared the Soviets as a US enemy (1947).", choices: [
    { text: "Announce the Doctrine \u2014 draw the line against communism", dom: 10, intl: -10, pwr: 12, gold: -15, nations: { russia: -22, britain: 12, france: 8 }, policies: ["Truman Doctrine"], cost: 30 },
    { text: "Provide secret aid only \u2014 avoid public confrontation", dom: -5, intl: -5, pwr: 5, gold: -8, nations: { russia: -8, britain: 3 }, policies: [], cost: 15 },
    { text: "Let Europe handle its own problems", dom: 8, intl: -12, pwr: -8, gold: 10, nations: { russia: 5, britain: -15, france: -12 }, policies: [], cost: 0 },
    { text: "Propose a UN-led intervention instead", dom: -3, intl: 12, pwr: -3, gold: -8, nations: { russia: -5, britain: 5, france: 8 }, policies: ["UN Intervention"], cost: 12 },
    { text: "Offer to negotiate with the Soviets over spheres of influence", dom: -8, intl: 8, pwr: -5, gold: 0, nations: { russia: 8, britain: -8, france: -5 }, policies: [], cost: 5 },
    { text: "Massive military buildup \u2014 actions speak louder than words", dom: 5, intl: -8, pwr: 18, gold: -20, nations: { russia: -15, britain: 5 }, policies: ["Military Buildup"], cost: 40 },
  ]},
  { id: "nato_formation", year: 1949, duration: "long", title: "Formation of NATO", desc: "The Soviet threat is real. Western nations want a mutual defense pact. If one is attacked, all respond. But this means committing American troops to defend Europe permanently \u2014 the ultimate break from isolationism.", termDef: "NATO: A military alliance between the U.S., Canada, and Western European nations (1949).", choices: [
    { text: "Found NATO \u2014 collective defense against the Soviets", dom: 5, intl: 10, pwr: 12, gold: -15, nations: { russia: -22, britain: 15, france: 12 }, policies: ["NATO"], cost: 35 },
    { text: "Join but with limits on troop deployments", dom: -3, intl: 5, pwr: 5, gold: -8, nations: { russia: -10, britain: 5, france: 5 }, policies: ["Limited NATO"], cost: 15 },
    { text: "Refuse \u2014 America will not be Europe's shield", dom: 10, intl: -15, pwr: -5, gold: 10, nations: { russia: 8, britain: -18, france: -15 }, policies: [], cost: 0 },
    { text: "Propose a global alliance, not just Western", dom: -5, intl: 15, pwr: 5, gold: -12, nations: { russia: -5, britain: 8, france: 8, china: 5 }, policies: ["Global Alliance"], cost: 25 },
    { text: "Focus on nuclear deterrence instead of alliances", dom: 5, intl: -8, pwr: 15, gold: -10, nations: { russia: -12, britain: -5 }, policies: ["Nuclear Umbrella"], cost: 20 },
    { text: "Offer the Soviets a non-aggression pact as alternative", dom: -8, intl: 8, pwr: -8, gold: 5, nations: { russia: 10, britain: -12, france: -10 }, policies: [], cost: 5 },
  ]},

  var [vsAIGold, setVsAIGold] = useState(140);
  var [vsAIRelations, setVsAIRelations] = useState({});
  var [vsAIHistory, setVsAIHistory] = useState([]); // { event, choiceText }
  var [vsAttacking, setVsAttacking] = useState({}); // nid -> true: nations AI sent to attack player
  var [vsDefending, setVsDefending] = useState({}); // nid -> true: nations player assigned to defend
  var [vsAIAttacking, setVsAIAttacking] = useState({}); // nations player sent to attack AI

  var diff = DIFF[difficulty];

  var era = evt ? getEra(evt.year) : ERAS[0];

  // Batched achievement unlocking - accumulates into pending, flushes once
  var pendingAchRef = useRef(null);
  var popupQueueRef = useRef([]);

  function startAchBatch() {
    pendingAchRef.current = Object.assign({}, achievements);
    popupQueueRef.current = [];
  }

  function flushAchBatch() {
    if (!pendingAchRef.current) return;
    var na = pendingAchRef.current;
    setAchievements(na);
    saveAch(na);
    pendingAchRef.current = null;
    // Show popups sequentially
    var queue = popupQueueRef.current;
    if (queue.length > 0) {
      var showNext = function(i) {
        if (i >= queue.length) return;
        setAchPopup(queue[i]);
        setTimeout(function() { setAchPopup(null); setTimeout(function() { showNext(i + 1); }, 300); }, 2500);
      };
      showNext(0);
    }
    popupQueueRef.current = [];
  }

  function unlock(id) {
    var tier = getTier(eventCount);
    var isSecret = SECRET_DEFS.some(function(s) { return s.id === id; });
    // Use pending batch if active, otherwise direct
    var current = pendingAchRef.current || achievements;

    if (isSecret) {
      if (current[id]) return;
      var na = pendingAchRef.current || Object.assign({}, achievements);
      na[id] = true;
      if (pendingAchRef.current) {
        pendingAchRef.current = na;
        var def = ALL_ACH.find(function(a) { return a.id === id; });
        if (def) popupQueueRef.current.push(def);
      } else {
        setAchievements(na); saveAch(na);
        var def = ALL_ACH.find(function(a) { return a.id === id; });
        if (def) { setAchPopup(def); setTimeout(function() { setAchPopup(null); }, 3500); }
      }
      return;
    }
    // Tiered
    var existing = current[id];
    if (existing && TIER_ORDER[existing.tier] >= TIER_ORDER[tier]) return;
    var na = pendingAchRef.current || Object.assign({}, achievements);
    na[id] = { tier: tier };
    var def = ALL_ACH.find(function(a) { return a.id === id; });
    var isUpgrade = !!existing;
    if (pendingAchRef.current) {
      pendingAchRef.current = na;
      if (def) popupQueueRef.current.push(Object.assign({}, def, { tierLabel: isUpgrade ? "Upgraded to " + tier + "!" : tier + " unlocked!" }));
    } else {
      setAchievements(na); saveAch(na);
      if (def) {
        var popDef = Object.assign({}, def, { tierLabel: isUpgrade ? "Upgraded to " + tier + "!" : tier + " unlocked!" });
        setAchPopup(popDef); setTimeout(function() { setAchPopup(null); }, 3500);
      }
    }
  }

  function calcIncome() {
    var baseIncome = expScale(stats.dom, 8);
    var warDrain = Object.keys(wars).filter(function(k) { return wars[k]; }).length * 10;
    var pwrReduction = expScale(stats.pwr, 1);
    return Math.max(1, Math.round(baseIncome * diff.goldMult) - Math.round(warDrain / pwrReduction));
  }
  function calcRepDrift() { return Math.round(stats.intl * 0.04); }
  function calcWarCostMult() { return 1 / expScale(stats.pwr, 1); }

  var income = calcIncome();
  var repDrift = calcRepDrift();

  // Pick 3 random choices from 6
  function pickChoices(event) {
    var all = event.choices.length;
    var idxs = shuffle(Array.from({ length: all }, function(_, i) { return i; }));
    return idxs.slice(0, 3);
  }

  function rerollChoices() {
    if (!evt || gold < diff.rerollCost) return;
    setGold(function(p) { return p - diff.rerollCost; });
    setSpent(function(p) { return p + diff.rerollCost; });
    var old = shownChoiceIdxs;
    var allIdxs = Array.from({ length: evt.choices.length }, function(_, i) { return i; });
    var hidden = allIdxs.filter(function(i) { return old.indexOf(i) === -1; });
    // Guarantee at least 1 new choice
    if (hidden.length === 0) return;
    var guaranteed = hidden[Math.floor(Math.random() * hidden.length)];
    var pool = allIdxs.filter(function(i) { return i !== guaranteed; });
    var shuffled = shuffle(pool);
    var rest = shuffled.slice(0, 2);
    setShownChoiceIdxs(shuffle([guaranteed].concat(rest)));
    setRerollCount(function(p) { return p + 1; });
  }

  function initGame() {
    var d = DIFF[difficulty];
    var req = SORTED_EVENTS.filter(function(e) { return !e.id.startsWith("bonus_"); });
    var bon = SORTED_EVENTS.filter(function(e) { return e.id.startsWith("bonus_"); });
    var pool = req.slice();
    if (eventCount >= 42) {
      // Include all bonus events for complete playthroughs
      bon.forEach(function(b) { pool.push(b); });
    } else {
      bon.forEach(function(b) { if (Math.random() > 0.3) pool.push(b); });
    }
    pool.sort(function(a, b) { return a.year - b.year; });
    var ct = Math.min(eventCount, pool.length);
    var step = pool.length / ct;
    var sel = [];
    for (var i = 0; i < ct; i++) sel.push(pool[Math.min(Math.floor(i * step), pool.length - 1)]);
    var seen = {};
    var unique = sel.filter(function(e) { if (seen[e.id]) return false; seen[e.id] = true; return true; });
    setGameEvents(unique); setIdx(0);
    setStats({ dom: 25, intl: 25, pwr: 25 });
    setGold(d.startGold); setSpent(0); setEarned(d.startGold);
    var ir = {}; NATIONS.forEach(function(n) { ir[n.id] = 0; });
    setRelations(ir); setPolicies([]); setPurchases([]); setHistory([]);
    setResult(null); setShowTerm(false); setGameOver(null); setFadeIn(true);
    setTab("event"); setLoans({}); setWars({});
    setExpHistory({}); setExpNation({}); setRerollCount(0); setUsedEmergency({});
    if (unique.length > 0) setShownChoiceIdxs(pickChoices(unique[0]));
  }

  function applyStat(val, stat) {
    var raw = val < 0 ? Math.round(val * diff.punishMult) : Math.round(val * diff.statMult);
    if (raw < 0 && stat !== undefined) return diminish(raw, stat, diff.goThresh);
    return raw;
  }
  function costOf(c) { return Math.round((c.cost || 0) * diff.costMult); }

  function checkMidAch(ns, nr, nw, nl, newGold) {
    if (Object.keys(nl || loans).filter(function(k) { return (nl || loans)[k] > 0; }).length >= 3) unlock("loan_shark");
    if (Object.keys(nw || wars).filter(function(k) { return (nw || wars)[k]; }).length >= 3) unlock("warmonger");
    // Secret: billionaire
    var g = newGold !== undefined ? newGold : gold;
    if (g >= 1000) unlock("sec_billionaire");
  }

  function checkEndAch() {
    startAchBatch();
    if (difficulty === "easy") unlock("beat_easy");
    if (meetsMinDiff(difficulty, "normal")) unlock("beat_normal");
    if (meetsMinDiff(difficulty, "hard")) unlock("beat_hard");
    if (meetsMinDiff(difficulty, "brutal")) unlock("beat_brutal");
    unlock("scholar");
    if (meetsMinDiff(difficulty, "hard") && purchases.length >= 5) unlock("all_territory");
    if (meetsMinDiff(difficulty, "hard") && !Object.values(relations).some(function(v) { return v < -30; })) unlock("pacifist");
    if (meetsMinDiff(difficulty, "hard") && stats.dom >= STAT_MAX) unlock("max_dom");
    if (meetsMinDiff(difficulty, "hard") && stats.intl >= STAT_MAX) unlock("max_intl");
    if (meetsMinDiff(difficulty, "hard") && stats.pwr >= STAT_MAX) unlock("max_pwr");
    if (meetsMinDiff(difficulty, "normal") && Object.keys(loans).filter(function(k) { return loans[k] > 0; }).length === 0 && gold >= 100) unlock("debt_free");
    if (Math.round((stats.dom + stats.intl + stats.pwr + 150) / 3) >= 90) unlock("s_rank");
    flushAchBatch();
  }

  function triggerGameOver(msg, fromCeasefire) {
    if (!campaignLevel) {
      if (difficulty === "easy") unlock("sec_easy_loss");
      if (fromCeasefire) unlock("sec_ceasefire");
    }
    setGameOver(msg);
  }

  function applyChoice(c) {
    var cost = costOf(c);
    if (cost > gold) return;
    var ns = {
      dom: clamp(stats.dom + applyStat(c.dom, stats.dom), -STAT_MAX, STAT_MAX),
      intl: clamp(stats.intl + applyStat(c.intl, stats.intl), -STAT_MAX, STAT_MAX),
      pwr: clamp(stats.pwr + applyStat(c.pwr, stats.pwr), -STAT_MAX, STAT_MAX),
    };
    var ng = Math.max(0, gold + Math.round((c.gold || 0) * diff.goldMult) - cost);
    var nr = Object.assign({}, relations);
    if (c.nations) { Object.keys(c.nations).forEach(function(nid) { if (nr[nid] !== undefined) nr[nid] = clamp(nr[nid] + applyStat(c.nations[nid]), -100, 50); }); }
    var nw = Object.assign({}, wars);
    // In versus mode, nations don't declare war on player — they switch sides instead
    if (!vsMode && diff.warThresh != null) { Object.keys(nr).forEach(function(nid) { if (nr[nid] <= diff.warThresh && !nw[nid]) { var nat = NATIONS.find(function(n) { return n.id === nid; }); if (nat && evt && evt.year >= nat.intro) nw[nid] = true; } }); }
    setStats(ns); setGold(ng); setSpent(function(p) { return p + cost; });
    if (Math.round((c.gold || 0) * diff.goldMult) > 0) setEarned(function(p) { return p + Math.round((c.gold || 0) * diff.goldMult); });
    setRelations(nr); setWars(nw);
    if (c.policies && c.policies.length) setPolicies(function(p) { return p.concat(c.policies); });
    if (c.purchase) setPurchases(function(p) { return p.concat([c.purchase]); });
    setResult(Object.assign({}, c, { actualCost: cost }));
    setShowTerm(true);
    setHistory(function(p) { return p.concat([{ event: evt, choice: c, stats: ns, gold: ng }]); });
    if (!campaignLevel && !vsMode) checkMidAch(ns, nr, nw, loans, ng);
    var th = diff.goThresh;
    if (vsMode) {
      if (ns.dom <= th || ns.intl <= th || ns.pwr <= th) setTimeout(function() { setGameOver("vs_loss"); }, 800);
    } else {
      if (ns.dom <= th) setTimeout(function() { triggerGameOver("Impeachment. Your people turned on you."); }, 800);
      else if (ns.intl <= th) setTimeout(function() { triggerGameOver("America is an international pariah."); }, 800);
      else if (ns.pwr <= th) setTimeout(function() { triggerGameOver("America is irrelevant on the world stage."); }, 800);
    }
  }

  function faceConsequences() {
    var domP = diminish(-Math.round(8 * diff.punishMult), stats.dom, diff.goThresh);
    var intlP = diminish(-Math.round(6 * diff.punishMult), stats.intl, diff.goThresh);
    var pwrP = diminish(-Math.round(5 * diff.punishMult), stats.pwr, diff.goThresh);

      // Prefer choices that also drain gold when player is poor
      if (!playerRichest && (c.gold || 0) > 0) score += 3;
      // Small randomness (less than before — AI is more deliberate)
      score += (Math.random() - 0.5) * 4;
      if (score > bestScore) { bestScore = score; best = c; }
    }
    return best || all[Math.floor(Math.random() * all.length)];
  }

  // Process AI turn — called inside nextEvent for versus mode
  function vsProcessAITurn(event, ai) {
    var c = vsAIPickChoice(event, ai);
    // Apply choice to AI stats WITH bonuses (AI gets stat inflation like brutal difficulty)
    var sb = ai.statBonus || 2;
    var ns = {
      dom: clamp((vsAIStats.dom || 25) + Math.round(c.dom || 0) + (c.dom > 0 ? sb : 0), -STAT_MAX, STAT_MAX),
      intl: clamp((vsAIStats.intl || 25) + Math.round(c.intl || 0) + (c.intl > 0 ? sb : 0), -STAT_MAX, STAT_MAX),
      pwr: clamp((vsAIStats.pwr || 25) + Math.round(c.pwr || 0) + (c.pwr > 0 ? sb : 0), -STAT_MAX, STAT_MAX),
    };
    // AI gets discounted costs and gold bonus each turn
    var aiCost = Math.round((c.cost || 0) * 0.75);
    var ng = Math.max(0, (vsAIGold || 140) + Math.round((c.gold || 0) * 1.3) - aiCost + (ai.goldBonus || 10));
    // AI relations — boosted for friend nations
    var nr = Object.assign({}, vsAIRelations);
    if (c.nations) {
      Object.keys(c.nations).forEach(function(nid) {
        if (nr[nid] !== undefined) {
          var bonus = ai.friendNations.indexOf(nid) >= 0 ? 8 : 2;
          nr[nid] = clamp((nr[nid] || 0) + Math.round(c.nations[nid]) + bonus, -100, 50);
        }
      });
    }
    // AI passively drifts its friend nations positive each turn
    ai.friendNations.forEach(function(nid) {
      if (nr[nid] !== undefined) nr[nid] = clamp((nr[nid] || 0) + 2, -100, 50);
    });
    setVsAIStats(ns); setVsAIGold(ng); setVsAIRelations(nr);
    setVsAIHistory(function(p) { return p.concat([{ event: event, choiceText: c.text }]); });

    // AI sabotage: periodically damages player stats directly
    if (Math.random() < (ai.sabotageChance || 0.2) && ng > 20) {
      var targets = ["dom", "intl", "pwr"];
      var weakest = targets[0];
      targets.forEach(function(t) { if (stats[t] < stats[weakest]) weakest = t; });
      // AI targets player's weakest stat 60% of the time, random otherwise
      var target = Math.random() < 0.6 ? weakest : targets[Math.floor(Math.random() * 3)];
      var sabAmt = -Math.round(3 + Math.random() * 5);
      setStats(function(p) { var o = Object.assign({}, p); o[target] = clamp(o[target] + sabAmt, -STAT_MAX, STAT_MAX); return o; });
      setVsAIGold(function(p) { return Math.max(0, p - 15); });
    }

    // AI military actions — smarter deployment
    var activeN = getActiveNations(event.year);
    activeN.forEach(function(n) {
      var aiStatus = vsNationStatusWith(nr, n.id);
      if (aiStatus !== "ai") return;
      // AI always sends undeployed allies to attack if aggressive enough
      if (!vsAttacking[n.id] && !vsAIDefending[n.id]) {
        // Counter: if player is attacking AI, prioritize defense
        var playerAttackCount = Object.keys(vsAIAttacking).filter(function(k) { return vsAIAttacking[k]; }).length;
        var aiDefendCount = Object.keys(vsAIDefending).filter(function(k) { return vsAIDefending[k]; }).length;
        if (playerAttackCount > aiDefendCount && Math.random() < ai.defendChance + 0.3) {
          setVsAIDefending(function(p) { var o = Object.assign({}, p); o[n.id] = true; return o; });
        } else if (Math.random() < ai.attackChance) {
          setVsAttacking(function(p) { var o = Object.assign({}, p); o[n.id] = true; return o; });
        }
      }
    });

    // Check if AI loses
    var aiTh = DIFF.normal.goThresh;
    if (ns.dom <= aiTh || ns.intl <= aiTh || ns.pwr <= aiTh || ng <= 0) {
      return "ai_lost";
    }
    return null;
  }

  // Helper: determine nation alignment using specific AI relations (for AI turn calculation)
  function vsNationStatusWith(aiRel, nid) {
    var pr = relations[nid] || 0;
    var ar = (aiRel || {})[nid] || 0;
    if (pr >= VS_ALLY_MIN && (pr - ar) >= VS_ALLY_LEAD) return "player";
    if (ar >= VS_ALLY_MIN && (ar - pr) >= VS_ALLY_LEAD) return "ai";
    return "neutral";
  }

  // Versus war damage: nations attacking player hurt player stats each turn
  function vsCalcAttackDamage() {
    var attackers = Object.keys(vsAttacking || {}).filter(function(k) { return vsAttacking[k]; });
    var defenders = Object.keys(vsDefending || {}).filter(function(k) { return vsDefending[k]; });
    var netAttackers = Math.max(0, attackers.length - defenders.length);
    return netAttackers;
  }

  // Versus war damage to AI: nations player sent to attack
  function vsCalcAIAttackDamage() {
    var attackers = Object.keys(vsAIAttacking || {}).filter(function(k) { return vsAIAttacking[k]; });
    var defenders = Object.keys(vsAIDefending || {}).filter(function(k) { return vsAIDefending[k]; });
    var netAttackers = Math.max(0, attackers.length - defenders.length);
    return netAttackers;
  }

          {!isWin && !isAbandoned && !isVs && <p style={{ fontSize: 14, color: "#B54444", maxWidth: 380, lineHeight: 1.5, marginBottom: 12 }}>{gameOver}</p>}
          {isVs && <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 12, width: "100%", maxWidth: 360 }}>

                <div style={{ textAlign: "center" }}><div style={{ color: stats.pwr > 0 ? "#5B8C5A" : "#B54444", fontWeight: 700 }}>{stats.pwr}</div><div style={{ fontSize: 8, color: "var(--dim)" }}>Pwr</div></div>

                <div style={{ textAlign: "center" }}><div style={{ color: vsAIStats.dom > 0 ? "#5B8C5A" : "#B54444", fontWeight: 700 }}>{vsAIStats.dom}</div><div style={{ fontSize: 8, color: "var(--dim)" }}>Dom</div></div>
                <div style={{ textAlign: "center" }}><div style={{ color: vsAIStats.intl > 0 ? "#5B8C5A" : "#B54444", fontWeight: 700 }}>{vsAIStats.intl}</div><div style={{ fontSize: 8, color: "var(--dim)" }}>Intl</div></div>
                <div style={{ textAlign: "center" }}><div style={{ color: vsAIStats.pwr > 0 ? "#5B8C5A" : "#B54444", fontWeight: 700 }}>{vsAIStats.pwr}</div><div style={{ fontSize: 8, color: "var(--dim)" }}>Pwr</div></div>
              </div>
              <div style={{ fontSize: 10, color: "#DAA520", marginTop: 4 }}>{"💰 "}{money(vsAIGold)}</div>
            </div>
          </div>}
          {!isVs && <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginBottom: 12, width: "100%", maxWidth: 300 }}>
            {[{ l: "Dom", v: stats.dom }, { l: "Intl", v: stats.intl }, { l: "Pwr", v: stats.pwr }].map(function(s) { return (
              <div key={s.l} style={{ padding: 8, background: "var(--card)", borderRadius: 6, border: "1px solid var(--border)", textAlign: "center" }}>
                <div style={{ fontSize: 20, fontWeight: 700, color: s.v > 0 ? "#5B8C5A" : "#B54444" }}>{s.v}</div>

          </div>}

            <Btn onClick={function() { cleanupVersus(); setScreen("title"); setGameOver(null); }} style={{ background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "10px 16px" }}>Menu</Btn>
            {!isVs && <Btn onClick={function() { setScreen("achievements"); }} style={{ background: "transparent", color: "#DAA520", border: "1px solid rgba(218,165,32,0.3)", padding: "10px 16px" }}>{"\u{1F3C6}"}</Btn>}
            <Btn onClick={function() { if (isVs) { initVersus(); } else { initGame(); } setGameOver(null); }} style={{ background: "#5B7553", color: "#f0e8d8", padding: "10px 16px" }}>Again</Btn>
          </div>
        </div>
      </div>
    );
  }

  // ═══ MAIN GAME ═══
  if (screen === "game" && evt) {
    var tabS = function(k) { return { flex: 1, padding: "9px 6px", background: tab === k ? "var(--card)" : "transparent", border: "none", borderBottom: tab === k ? "2px solid " + era.color : "2px solid transparent", color: tab === k ? "var(--text)" : "var(--dim)", cursor: "pointer", fontSize: 10, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 1 }; };

    return (
      <div style={base}>{fonts}{popupEl}

          <div style={{ fontSize: 11, color: "#B54444", fontFamily: "var(--sans)", marginBottom: 8 }}>{"Drains ~"}{Math.max(2, Math.round(loanAmt * 0.15))}{" rep/turn"}</div>
          <div style={{ fontSize: 10, fontFamily: "var(--mono)", color: "var(--dim)" }}>{money(loanAmt)}</div>
          <input type="range" min={5} max={100} step={5} value={loanAmt} onChange={function(e) { setLoanAmt(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#DAA520", margin: "6px 0" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <Btn onClick={function() { setLoanModal(null); }} style={{ flex: 1, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "8px" }}>X</Btn>

        </Modal>}
        {repayModal && <Modal onClose={function() { setRepayModal(null); }}>
          <div style={{ fontSize: 14, marginBottom: 6 }}>{"Repay "}{(NATIONS.find(function(n) { return n.id === repayModal; }) || {}).flag}</div>
          <input type="range" min={5} max={Math.max(5, Math.min(gold, loans[repayModal] || 0))} step={5} value={Math.min(repayAmt, gold, loans[repayModal] || 0)} onChange={function(e) { setRepayAmt(parseInt(e.target.value)); }} style={{ width: "100%", accentColor: "#5B8C5A", margin: "6px 0" }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <Btn onClick={function() { setRepayModal(null); }} style={{ flex: 1, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)", padding: "8px" }}>X</Btn>
            <Btn onClick={function() { repayLoan(repayModal, repayAmt); }} style={{ flex: 2, background: "#5B8C5A", color: "#f0e8d8", fontWeight: 700, padding: "8px" }}>{"Repay "}{money(Math.min(repayAmt, gold, loans[repayModal] || 0))}</Btn>
          </div>
        </Modal>}

        <div style={{ position: "sticky", top: 0, zIndex: 20, background: "var(--bg)", borderBottom: "1px solid var(--border)" }}>
          {/* Versus opponent banner */}
          {vsMode && vsAI && <div style={{ padding: "4px 10px", background: "rgba(181,68,68,0.08)", borderBottom: "1px solid rgba(181,68,68,0.15)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#B54444", fontWeight: 700 }}>{"VS "}{vsAI.icon}{" "}{vsAI.name}</span>
            <div style={{ display: "flex", gap: 6, fontSize: 9, fontFamily: "var(--mono)" }}>
              <span style={{ color: vsAIStats.dom > 0 ? "#7a7a6a" : "#B54444" }}>{"\u{1F3DB}"}{vsAIStats.dom}</span>
              <span style={{ color: vsAIStats.intl > 0 ? "#7a7a6a" : "#B54444" }}>{"\u{1F30D}"}{vsAIStats.intl}</span>
              <span style={{ color: vsAIStats.pwr > 0 ? "#7a7a6a" : "#B54444" }}>{"\u2694"}{vsAIStats.pwr}</span>
              <span style={{ color: "#DAA520" }}>{"💰"}{money(vsAIGold)}</span>
            </div>
          </div>}
          <div style={{ display: "flex", borderBottom: "1px solid var(--border)" }}>
            <button style={tabS("event")} onClick={function() { setTab("event"); }}>{"📜 Event"}</button>
            <button style={tabS("diplomacy")} onClick={function() { setTab("diplomacy"); }}>{vsMode ? "\u2694 War Room" : "🤝 Diplomacy"}</button>
            {vsMode && <button style={tabS("intel")} onClick={function() { setTab("intel"); }}>{"\u{1F575} Intel"}</button>}
            <button style={tabS("profile")} onClick={function() { setTab("profile"); }}>{"👤 Profile"}</button>
          </div>
          <div style={{ padding: "6px 10px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 9, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, color: era.color }}>{era.name}{" "}{evt.year}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {warCount > 0 && <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#ff4444", fontWeight: 700 }}>{"\u2694"}{warCount}</span>}
                <span style={{ fontSize: 11, fontFamily: "var(--mono)", color: gold < 20 ? "#B54444" : "#DAA520", fontWeight: 700 }}>{"💰"}{money(gold)}</span>
                <span style={{ fontSize: 8, fontFamily: "var(--mono)", color: income >= 0 ? "#5B8C5A" : "#B54444" }}>{signedM(income)}</span>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
              <div>
                <StatBar label="Dom" value={stats.dom} icon={"\u{1F3DB}"} color="#5B8C5A" warn={diff.goThresh} desc={domDesc} compact />
                {!usedEmergency.fundraise && <button onClick={emergencyFundraise} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(218,165,32,0.08)", color: "#DAA520", border: "1px solid rgba(218,165,32,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"💰 Emergency +40M"}</button>}
              </div>
              <div>
                <StatBar label="Intl" value={stats.intl} icon={"\u{1F30D}"} color="#4A7FB5" warn={diff.goThresh} desc={intlDesc} compact />
                {!usedEmergency.rally && <button onClick={emergencyRally} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(91,117,83,0.08)", color: "#5B8C5A", border: "1px solid rgba(91,117,83,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"\u{1F3DB} Rally +12 Dom"}</button>}
              </div>
              <div>
                <StatBar label="Pwr" value={stats.pwr} icon={"\u2694"} color="#B5854A" warn={diff.goThresh} desc={pwrDesc} compact />
                {warCount > 0 && !usedEmergency.ceasefire && gold >= Math.round(25 * diff.costMult) && <button onClick={function() { emergencyCeasefire(warNids[0]); }} style={{ width: "100%", padding: "3px 0", fontSize: 8, fontFamily: "var(--mono)", background: "rgba(74,127,181,0.08)", color: "#4A7FB5", border: "1px solid rgba(74,127,181,0.2)", borderRadius: 3, cursor: "pointer", marginTop: 2 }}>{"\u2694 Ceasefire"}</button>}
              </div>
            </div>
          </div>
        </div>

        <div style={{ padding: "12px 10px 80px 10px", maxWidth: 540, margin: "0 auto" }}>
          {tab === "event" && (
            <div style={{ opacity: fadeIn ? 1 : 0, transform: fadeIn ? "translateY(0)" : "translateY(10px)", transition: "all 0.25s ease" }}>
              {!vsMode && warCount > 0 && <div style={{ padding: "6px 10px", background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", borderRadius: 6, marginBottom: 8, fontSize: 11, fontFamily: "var(--sans)", color: "#ff6666" }}>
                {"\u2694 At war with "}{warCount}{" nation"}{warCount > 1 ? "s" : ""}{" \u2014 costs at "}{Math.round(calcWarCostMult() * 100)}{"%"}
              </div>}
              {vsMode && vsCalcAttackDamage() > 0 && <div style={{ padding: "6px 10px", background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", borderRadius: 6, marginBottom: 8, fontSize: 11, fontFamily: "var(--sans)", color: "#ff6666" }}>
                {"\u2694 Under attack! "}{vsCalcAttackDamage()}{" net attacker"}{vsCalcAttackDamage() > 1 ? "s" : ""}{" \u2014 check War Room"}
              </div>}

              <div style={{ textAlign: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", textTransform: "uppercase", letterSpacing: 2 }}>{"Event "}{idx + 1}{"/"}{gameEvents.length}</span>
              </div>
              <h2 style={{ textAlign: "center", fontSize: "clamp(18px, 4vw, 24px)", fontWeight: 700, margin: "6px 0", lineHeight: 1.2 }}>{evt.title}</h2>
              <p style={{ fontSize: 14, lineHeight: 1.7, textAlign: "center", margin: "6px 0 14px 0", fontFamily: "var(--sans)" }}>{evt.desc}</p>

              {!result ? (
                <div>
                  {allBroke && (
                    <div style={{ padding: "10px 14px", background: vsMode ? "rgba(181,68,68,0.1)" : "rgba(218,165,32,0.1)", border: "1px solid " + (vsMode ? "rgba(181,68,68,0.3)" : "rgba(218,165,32,0.3)"), borderRadius: 6, marginBottom: 10 }}>
                      <div style={{ fontSize: 10, fontFamily: "var(--mono)", color: vsMode ? "#B54444" : "#DAA520", marginBottom: 6 }}>{vsMode ? "Treasury Empty \u2014 No Loans in Versus" : "Treasury Empty"}</div>
                      {!vsMode && loanableNat.length > 0 ? (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
                          {loanableNat.map(function(n) { return <button key={n.id} onClick={function() { setLoanModal(n.id); setLoanAmt(20); }} style={{ padding: "4px 10px", background: "rgba(218,165,32,0.15)", border: "1px solid rgba(218,165,32,0.4)", borderRadius: 4, cursor: "pointer", fontSize: 11, fontFamily: "var(--sans)", color: "var(--text)" }}>{n.flag}{" "}{n.name}</button>; })}
                        </div>
                      ) : (
                        <div>
                          <button onClick={faceConsequences} style={{ width: "100%", padding: 12, fontSize: 12, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, background: "rgba(181,68,68,0.15)", color: "#ff6666", border: "1px solid rgba(181,68,68,0.4)", borderRadius: 6, cursor: "pointer", fontWeight: 700 }}>{"💀 Face Consequences"}</button>
                        </div>
                      )}
                    </div>
                  )}
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {shownChoices.map(function(c, i) {
                      var cost = costOf(c); var ok = cost <= gold;
                      return (
                        <button key={shownChoiceIdxs[i]} onClick={function() { if (ok) applyChoice(c); }} disabled={!ok} style={{ padding: "12px 14px", background: ok ? "var(--card)" : "rgba(28,27,23,0.5)", border: "1px solid " + (ok ? "var(--border)" : "#2a2920"), borderRadius: 6, color: ok ? "var(--text)" : "#5a5548", fontFamily: "var(--sans)", fontSize: 13, lineHeight: 1.4, textAlign: "left", cursor: ok ? "pointer" : "not-allowed", opacity: ok ? 1 : 0.5 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", gap: 6 }}>
                            <div><span style={{ color: era.color, fontWeight: 700, marginRight: 4, fontFamily: "var(--serif)" }}>{["I.", "II.", "III."][i]}</span>{c.text}</div>
                            {cost > 0 && <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: ok ? "#DAA520" : "#B54444", whiteSpace: "nowrap", fontWeight: 700 }}>{money(cost)}</span>}
                          </div>
                          <div style={{ display: "flex", gap: 6, marginTop: 4, fontSize: 9, fontFamily: "var(--mono)", flexWrap: "wrap" }}>
                            {c.dom !== 0 && <span style={{ color: c.dom > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F3DB}"}{signed(c.dom)}</span>}
                            {c.intl !== 0 && <span style={{ color: c.intl > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F30D}"}{signed(c.intl)}</span>}
                            {c.pwr !== 0 && <span style={{ color: c.pwr > 0 ? "#5B8C5A" : "#B54444" }}>{"\u2694"}{signed(c.pwr)}</span>}
                            {(c.gold || 0) > 0 && <span style={{ color: "#DAA520" }}>{"💰+"}{c.gold}</span>}
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  {/* Reroll button */}
                  <div style={{ textAlign: "center", marginTop: 8 }}>
                    <Btn onClick={rerollChoices} disabled={gold < diff.rerollCost} style={{ padding: "6px 16px", fontSize: 10, background: "rgba(74,127,181,0.1)", color: gold < diff.rerollCost ? "var(--dim)" : "#4A7FB5", border: "1px solid rgba(74,127,181,0.3)" }}>
                      {"\u{1F3B2} Reroll Choices ("}{money(diff.rerollCost)}{")"}
                    </Btn>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ padding: "10px 14px", background: result.isFaceConsequences ? "rgba(181,68,68,0.08)" : "rgba(91,117,83,0.08)", border: "1px solid " + (result.isFaceConsequences ? "rgba(181,68,68,0.2)" : "rgba(91,117,83,0.2)"), borderRadius: 6, marginBottom: 8 }}>
                    <div style={{ fontSize: 9, textTransform: "uppercase", letterSpacing: 2, color: result.isFaceConsequences ? "#B54444" : "#5B7553", fontFamily: "var(--mono)", marginBottom: 3 }}>{result.isFaceConsequences ? "Consequences" : "Decision"}</div>
                    <div style={{ fontSize: 13, lineHeight: 1.4, fontFamily: "var(--sans)" }}>{result.text}</div>
                  </div>
                  <div style={{ padding: "8px 12px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 6, marginBottom: 8 }}>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6, fontSize: 10, fontFamily: "var(--mono)" }}>
                      {result.dom !== 0 && <span style={{ color: result.dom > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F3DB}"}{applyStat(result.dom, stats.dom)}</span>}
                      {result.intl !== 0 && <span style={{ color: result.intl > 0 ? "#5B8C5A" : "#B54444" }}>{"\u{1F30D}"}{applyStat(result.intl, stats.intl)}</span>}
                      {result.pwr !== 0 && <span style={{ color: result.pwr > 0 ? "#5B8C5A" : "#B54444" }}>{"\u2694"}{applyStat(result.pwr, stats.pwr)}</span>}
                      {result.actualCost > 0 && <span style={{ color: "#B54444" }}>{"💰-"}{money(result.actualCost)}</span>}
                      {result.purchase && <span style={{ color: "#DAA520" }}>{"🗺"}{result.purchase}</span>}
                    </div>
                  </div>
                  {showTerm && <div style={{ margin: "8px 0", padding: "10px 14px", background: evt.termDef.startsWith("\u2605") ? "rgba(218,165,32,0.05)" : "rgba(91,117,83,0.05)", border: "1px solid " + (evt.termDef.startsWith("\u2605") ? "rgba(218,165,32,0.2)" : "rgba(91,117,83,0.2)"), borderRadius: 6, fontSize: 12, lineHeight: 1.5, fontFamily: "var(--sans)" }}>
                    <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: evt.termDef.startsWith("\u2605") ? "#DAA520" : "#5B7553", marginBottom: 3 }}>{evt.termDef.startsWith("\u2605") ? "Bonus" : "📖 Term"}</div>
                    {evt.termDef}
                  </div>}
                  <Btn onClick={nextEvent} style={{ width: "100%", marginTop: 6, background: era.color, color: "#f0e8d8" }}>
                    {idx + 1 >= gameEvents.length ? "Legacy \u2192" : "Next \u2192 (+" + money(income) + ")"}
                  </Btn>
                </div>
              )}
            </div>
          )}

          {tab === "diplomacy" && !vsMode && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 10 }}>
                <h3 style={{ fontSize: 18, fontWeight: 700, margin: "6px 0 3px" }}>Relations</h3>
                <p style={{ fontSize: 9, color: "var(--dim)", fontFamily: "var(--mono)" }}>{"Drift: "}{signed(repDrift)}{"/turn | Tap for details"}</p>
              </div>
              {Object.keys(loans).filter(function(k) { return loans[k] > 0; }).length > 0 && (
                <div style={{ padding: "8px 12px", background: "rgba(218,165,32,0.06)", border: "1px solid rgba(218,165,32,0.2)", borderRadius: 6, marginBottom: 8, fontSize: 11, fontFamily: "var(--sans)" }}>
                  {Object.keys(loans).filter(function(k) { return loans[k] > 0; }).map(function(nid) {
                    var n = NATIONS.find(function(nn) { return nn.id === nid; }); if (!n) return null;
                    return <div key={nid} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                      <span>{n.flag}{" "}{money(loans[nid])}{" (-"}{Math.max(2, Math.round(loans[nid] * 0.15))}{"/t)"}</span>
                      {gold >= 5 && <Btn onClick={function() { setRepayModal(nid); setRepayAmt(Math.min(10, gold, loans[nid])); }} style={{ padding: "2px 8px", fontSize: 9, background: "#5B8C5A", color: "#f0e8d8" }}>Pay</Btn>}
                    </div>;
                  })}
                </div>
              )}
              {activeNat.map(function(n) {
                var v = relations[n.id] || 0; var atW = !!wars[n.id]; var hasL = (loans[n.id] || 0) > 0; var isE = !!expNation[n.id]; var info = getNationInfo(n.id);
                var col = atW ? "#ff4444" : v > 20 ? "#5B8C5A" : v > 0 ? "#7A9A6A" : v > -10 ? "#B5854A" : "#B54444";
                var lab = atW ? "WAR" : v > 30 ? "Allied" : v > 10 ? "Friend" : v > -10 ? "Neutral" : v > -30 ? "Tense" : "Hostile";
                return (
                  <div key={n.id} style={{ marginBottom: 2 }}>
                    <div onClick={function() { setExpNation(function(p) { var o = Object.assign({}, p); o[n.id] = !o[n.id]; return o; }); }} style={{ cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "6px 10px", background: atW ? "rgba(255,68,68,0.06)" : "#1c1b17", border: "1px solid " + (atW ? "rgba(255,68,68,0.2)" : "#2e2d28"), borderRadius: isE ? "6px 6px 0 0" : 6 }}>

                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: col, fontWeight: 600 }}>{lab}{" "}{signed(v)}</span>
                        <span style={{ fontSize: 10, color: "var(--dim)", transform: isE ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s", display: "inline-block" }}>{"\u25BC"}</span>
                      </div>
                    </div>
                    {isE && <div style={{ padding: "8px 12px", background: "rgba(30,29,24,0.8)", border: "1px solid var(--border)", borderTop: "none", borderRadius: "0 0 6px 6px", marginBottom: 3 }}>
                      {info.impacts.length > 0 && info.impacts.map(function(imp, ix) { return <div key={ix} style={{ display: "flex", justifyContent: "space-between", fontSize: 10, fontFamily: "var(--sans)", padding: "1px 0" }}>
                        <span>{imp.ongoing ? "🔄 " : ""}{imp.title}</span>
                        <span style={{ fontFamily: "var(--mono)", color: imp.amount > 0 ? "#5B8C5A" : "#B54444" }}>{signed(imp.amount)}{imp.ongoing ? "/t" : ""}</span>
                      </div>; })}
                      {info.hints.length > 0 && info.hints.map(function(h, hx) { return <div key={hx} style={{ fontSize: 10, color: "#8ab4d6", paddingLeft: 6, borderLeft: "2px solid rgba(74,127,181,0.3)", marginTop: 3, fontFamily: "var(--sans)" }}>{h}</div>; })}

                        {canLoan(n.id) && !atW && <Btn onClick={function() { setLoanModal(n.id); setLoanAmt(20); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(218,165,32,0.1)", color: "#DAA520", border: "1px solid rgba(218,165,32,0.2)" }}>Loan</Btn>}
                        {hasL && gold >= 5 && <Btn onClick={function() { setRepayModal(n.id); setRepayAmt(Math.min(10, gold, loans[n.id])); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(91,140,90,0.1)", color: "#5B8C5A", border: "1px solid rgba(91,140,90,0.2)" }}>Pay</Btn>}
                        {atW && !usedEmergency.ceasefire && gold >= Math.round(25 * diff.costMult) && <Btn onClick={function() { emergencyCeasefire(n.id); }} style={{ padding: "3px 8px", fontSize: 8, background: "rgba(74,127,181,0.1)", color: "#4A7FB5", border: "1px solid rgba(74,127,181,0.2)" }}>{"Ceasefire "}{money(Math.round(25 * diff.costMult))}</Btn>}
                      </div>
                    </div>}
                  </div>
                );
              })}
            </div>
          )}

          {/* ═══ VERSUS WAR ROOM ═══ */}
          {tab === "diplomacy" && vsMode && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 10 }}>
                <h3 style={{ fontSize: 18, fontWeight: 700, margin: "6px 0 3px" }}>War Room</h3>
                <p style={{ fontSize: 9, color: "var(--dim)", fontFamily: "var(--mono)" }}>Ally nations, then attack or defend</p>
              </div>
              {/* Active battles summary */}
              {(Object.keys(vsAttacking).length > 0 || Object.keys(vsAIAttacking).length > 0) && <div style={{ padding: "8px 12px", background: "rgba(255,68,68,0.06)", border: "1px solid rgba(255,68,68,0.15)", borderRadius: 6, marginBottom: 8 }}>
                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "#ff6666", marginBottom: 4 }}>ACTIVE WARFARE</div>
                {Object.keys(vsAttacking).filter(function(k) { return vsAttacking[k]; }).length > 0 && <div style={{ fontSize: 10, fontFamily: "var(--sans)", color: "#B54444", marginBottom: 2 }}>
                  {"Enemy attacking you: "}{Object.keys(vsAttacking).filter(function(k) { return vsAttacking[k]; }).map(function(nid) { var n = NATIONS.find(function(nn) { return nn.id === nid; }); return n ? n.flag + " " + n.name : nid; }).join(", ")}
                  {" (net dmg: "}{vsCalcAttackDamage()}{")"}
                </div>}
                {Object.keys(vsDefending).filter(function(k) { return vsDefending[k]; }).length > 0 && <div style={{ fontSize: 10, fontFamily: "var(--sans)", color: "#4A7FB5", marginBottom: 2 }}>
                  {"Your defenders: "}{Object.keys(vsDefending).filter(function(k) { return vsDefending[k]; }).map(function(nid) { var n = NATIONS.find(function(nn) { return nn.id === nid; }); return n ? n.flag + " " + n.name : nid; }).join(", ")}
                </div>}
                {Object.keys(vsAIAttacking).filter(function(k) { return vsAIAttacking[k]; }).length > 0 && <div style={{ fontSize: 10, fontFamily: "var(--sans)", color: "#5B8C5A", marginBottom: 2 }}>
                  {"You're attacking with: "}{Object.keys(vsAIAttacking).filter(function(k) { return vsAIAttacking[k]; }).map(function(nid) { var n = NATIONS.find(function(nn) { return nn.id === nid; }); return n ? n.flag + " " + n.name : nid; }).join(", ")}
                  {" (net dmg to AI: "}{vsCalcAIAttackDamage()}{")"}
                </div>}
              </div>}
              {/* Sabotage button */}
              <div style={{ marginBottom: 10, textAlign: "center" }}>
                {(function() { var allUsed = vsSabotagedThisTurn.dom && vsSabotagedThisTurn.intl && vsSabotagedThisTurn.pwr; var cantAfford = gold < 30; var dis = allUsed || cantAfford; return (
                <Btn onClick={function() { setVsSabotageTarget("pick"); }} disabled={dis} style={{ padding: "6px 16px", fontSize: 10, background: dis ? "rgba(60,55,45,0.3)" : "rgba(181,68,68,0.1)", color: dis ? "var(--dim)" : "#ff6666", border: "1px solid rgba(181,68,68,0.3)" }}>
                  {allUsed ? "\u{1F5E1} All Stats Sabotaged" : "\u{1F5E1} Sabotage Enemy (" + money(30) + ")"}
                </Btn>); })()}

              {vsSabotageTarget === "pick" && <div style={{ padding: 10, background: "var(--card)", border: "1px solid rgba(181,68,68,0.3)", borderRadius: 8, marginBottom: 10 }}>

                <div style={{ display: "flex", gap: 6 }}>
                  {[{ k: "dom", l: "\u{1F3DB} Dom" }, { k: "intl", l: "\u{1F30D} Intl" }, { k: "pwr", l: "\u2694 Pwr" }].map(function(s) {
                    var used = !!vsSabotagedThisTurn[s.k];
                    return <Btn key={s.k} onClick={function() { vsSabotage(s.k); }} disabled={used} style={{ flex: 1, padding: "6px", fontSize: 10, background: used ? "rgba(60,55,45,0.2)" : "rgba(181,68,68,0.1)", color: used ? "var(--dim)" : "#ff6666", border: "1px solid " + (used ? "var(--border)" : "rgba(181,68,68,0.2)") }}>{used ? "\u2713 " + s.l : s.l}</Btn>;

              </div>}

              {activeNat.map(function(n) {
                var pr = relations[n.id] || 0;
                var ar = (vsAIRelations || {})[n.id] || 0;
                var status = vsNationStatus(n.id);
                var isPlayerAlly = status === "player";
                var isAIAlly = status === "ai";
                var isAtk = !!vsAIAttacking[n.id];
                var isDef = !!vsDefending[n.id];
                var isEnemyAtk = !!vsAttacking[n.id];
                var isEnemyDef = !!vsAIDefending[n.id];
                var lab = isPlayerAlly ? (isAtk ? "ATTACKING" : isDef ? "DEFENDING" : "Your Ally") : isAIAlly ? (isEnemyAtk ? "ATTACKING YOU" : isEnemyDef ? "AI DEFENDING" : "Enemy Ally") : "Contested";
                // Bar mapping: use the raw differential mapped to a wider scale
                // Range: -80 to +80 differential → 0% to 100%. Alliance threshold at ±VS_ALLY_LEAD
                var differential = pr - ar;
                var barMax = 80;
                var pct = clamp(50 + (differential / barMax) * 50, 2, 98);
                // Threshold positions: alliance triggers at lead of VS_ALLY_LEAD (10)
                var playerThreshPct = 50 + (VS_ALLY_LEAD / barMax) * 50; // ~56%
                var aiThreshPct = 50 - (VS_ALLY_LEAD / barMax) * 50; // ~44%
                // Wider visual: also show the VS_ALLY_MIN (20) requirement as a softer line
                var sliderCol = isPlayerAlly ? "#5B8C5A" : isAIAlly ? "#B54444" : "#B5854A";
                var bgCard = isEnemyAtk ? "rgba(255,68,68,0.06)" : isPlayerAlly ? "rgba(91,117,83,0.06)" : isAIAlly ? "rgba(181,68,68,0.04)" : "var(--card)";
                var bdCard = isEnemyAtk ? "rgba(255,68,68,0.25)" : isPlayerAlly ? "rgba(91,117,83,0.25)" : isAIAlly ? "rgba(181,68,68,0.15)" : "var(--border)";

                      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ fontSize: 13, fontFamily: "var(--mono)", fontWeight: 700, color: pr > 15 ? "#5B8C5A" : pr > 0 ? "#506a50" : "#5a5548" }}>{signed(pr)}</span>
                        <span style={{ fontSize: 10, color: "#5B8C5A" }}>{"\u{1F1FA}\u{1F1F8}"}</span>
                      </div>
                    </div>
                    {/* Alignment bar */}
                    <div style={{ position: "relative", height: 18, background: "#141310", borderRadius: 9, overflow: "hidden", marginBottom: 4, border: "1px solid #252420" }}>

                      <div style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: (100 - playerThreshPct) + "%", background: "rgba(91,140,90,0.12)", borderRadius: "0 9px 9px 0" }} />
                      {/* Active fill from center */}
                      {differential > 0 && <div style={{ position: "absolute", left: "50%", top: 2, bottom: 2, width: Math.min(differential / barMax * 50, 48) + "%", background: isPlayerAlly ? "rgba(91,140,90,0.4)" : "rgba(91,140,90,0.15)", borderRadius: 4, transition: "width 0.4s ease" }} />}
                      {differential < 0 && <div style={{ position: "absolute", right: "50%", top: 2, bottom: 2, width: Math.min(-differential / barMax * 50, 48) + "%", background: isAIAlly ? "rgba(181,68,68,0.4)" : "rgba(181,68,68,0.15)", borderRadius: 4, transition: "width 0.4s ease" }} />}
                      {/* AI alliance threshold */}
                      <div style={{ position: "absolute", left: aiThreshPct + "%", top: 0, bottom: 0, width: 2, background: "#B54444", opacity: 0.7 }} />
                      {/* Player alliance threshold */}
                      <div style={{ position: "absolute", left: playerThreshPct + "%", top: 0, bottom: 0, width: 2, background: "#5B8C5A", opacity: 0.7 }} />
                      {/* Center line */}
                      <div style={{ position: "absolute", left: "calc(50% - 0.5px)", top: 0, bottom: 0, width: 1, background: "rgba(181,133,74,0.3)" }} />
                      {/* Slider dot */}
                      <div style={{ position: "absolute", left: "calc(" + pct + "% - 8px)", top: 1, width: 16, height: 16, borderRadius: "50%", background: sliderCol, border: "2px solid " + (isPlayerAlly ? "#8cd48a" : isAIAlly ? "#e88080" : "#d4b070"), boxShadow: "0 0 10px " + sliderCol + "a0", transition: "left 0.4s ease" }} />
                    </div>
                    {/* Zone labels under bar */}
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 7, fontFamily: "var(--mono)", color: "var(--dim)", marginBottom: 5, padding: "0 2px" }}>
                      <span style={{ color: "rgba(181,68,68,0.6)" }}>Enemy Zone</span>
                      <span>Contested</span>
                      <span style={{ color: "rgba(91,140,90,0.6)" }}>Your Zone</span>
                    </div>
                    {/* Hint if close to alliance */}
                    {!isPlayerAlly && !isAIAlly && (differential > 3 || differential < -3) && <div style={{ fontSize: 9, fontFamily: "var(--sans)", color: "var(--dim)", fontStyle: "italic", marginBottom: 4, textAlign: "center" }}>
                      {differential > 0 && !playerMeetsMin && "Need " + (VS_ALLY_MIN - pr) + " more rep to ally"}
                      {differential > 0 && playerMeetsMin && (VS_ALLY_LEAD - differential) > 0 && "Need " + (VS_ALLY_LEAD - differential) + " more lead to ally"}
                      {differential < 0 && "AI is pulling " + n.name + " to their side"}
                    </div>}
                    {/* Action buttons */}
                    {isPlayerAlly && !isAtk && !isDef && <div style={{ display: "flex", gap: 6 }}>
                      <Btn onClick={function() { vsSendAttack(n.id); }} style={{ flex: 1, padding: "6px", fontSize: 10, background: "rgba(181,68,68,0.1)", color: "#ff6666", border: "1px solid rgba(181,68,68,0.25)" }}>{"\u2694 Attack"}</Btn>
                      <Btn onClick={function() { vsSendDefend(n.id); }} style={{ flex: 1, padding: "6px", fontSize: 10, background: "rgba(74,127,181,0.1)", color: "#4A7FB5", border: "1px solid rgba(74,127,181,0.25)" }}>{"\u{1F6E1} Defend"}</Btn>
                    </div>}
                    {isPlayerAlly && (isAtk || isDef) && <Btn onClick={function() { vsRecallUnit(n.id); }} style={{ width: "100%", padding: "5px", fontSize: 9, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Recall</Btn>}
                  </div>
                );
              })}
            </div>
          )}

          {/* ═══ VERSUS INTEL TAB ═══ */}
          {tab === "intel" && vsMode && vsAI && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 10 }}>
                <h3 style={{ fontSize: 18, fontWeight: 700, margin: "6px 0 3px" }}>{vsAI.icon}{" "}{vsAI.name}</h3>
                <p style={{ fontSize: 10, color: "var(--dim)", fontFamily: "var(--mono)" }}>{vsAI.style}{" \u2014 "}{vsAI.desc}</p>

                </div>
                <div style={{ fontSize: 11, fontFamily: "var(--mono)", color: "#DAA520" }}>{"Treasury: "}{money(vsAIGold)}</div>

                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", marginBottom: 6 }}>ENEMY ALLIANCES</div>

                {activeNat.filter(function(n) { return vsNationStatus(n.id) === "ai"; }).map(function(n) {
                  var isEAtk = !!vsAttacking[n.id]; var isEDef = !!vsAIDefending[n.id];
                  return <div key={n.id} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 11, fontFamily: "var(--sans)" }}>
                    <span>{n.flag}{" "}{n.name}</span>
                    <span style={{ fontSize: 9, fontFamily: "var(--mono)", color: isEAtk ? "#ff6666" : isEDef ? "#4A7FB5" : "var(--dim)" }}>{isEAtk ? "ATTACKING YOU" : isEDef ? "DEFENDING" : "Reserve"}</span>
                  </div>;
                })}
              </div>
              {/* AI choice history */}
              <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8 }}>
                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", marginBottom: 6 }}>{"ENEMY DECISIONS ("}{vsAIHistory.length}{")"}</div>
                <div style={{ maxHeight: 200, overflow: "auto" }}>
                  {vsAIHistory.length === 0 && <div style={{ fontSize: 11, fontFamily: "var(--sans)", color: "var(--dim)", fontStyle: "italic" }}>No decisions yet</div>}
                  {vsAIHistory.slice().reverse().map(function(h, i) {
                    return <div key={i} style={{ padding: "4px 0", borderBottom: i < vsAIHistory.length - 1 ? "1px solid var(--border)" : "none", fontSize: 11, fontFamily: "var(--sans)" }}>

          {tab === "profile" && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 12 }}>
                <h3 style={{ fontSize: 20, fontWeight: 700, margin: 0 }}>{playerName}</h3>

              </div>
              <div style={{ padding: 12, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, fontFamily: "var(--sans)", fontSize: 11 }}>
                  <div>{"💰 "}{money(gold)}</div><div>{"📊 "}{signedM(income)}{"/t"}</div>
                  <div>{"📈 "}{money(earned)}{" earned"}</div><div>{"📉 "}{money(spent)}{" spent"}</div>
                </div>
              </div>
              <div style={{ padding: 12, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <StatBar label="Domestic" value={stats.dom} icon={"\u{1F3DB}"} color="#5B8C5A" warn={diff.goThresh} desc={domDesc} />
                <StatBar label="International" value={stats.intl} icon={"\u{1F30D}"} color="#4A7FB5" warn={diff.goThresh} desc={intlDesc} />
                <StatBar label="Power" value={stats.pwr} icon={"\u2694"} color="#B5854A" warn={diff.goThresh} desc={pwrDesc} />
              </div>
              {purchases.length > 0 && <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>{purchases.map(function(p, i) { return <span key={i} style={{ padding: "2px 6px", background: "rgba(91,117,83,0.1)", borderRadius: 3, fontSize: 10, fontFamily: "var(--mono)" }}>{p}</span>; })}</div>
              </div>}
              <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}>
                <div style={{ fontSize: 9, fontFamily: "var(--mono)", color: "var(--dim)", marginBottom: 4 }}>{"History ("}{history.length}{")"}</div>
                <div style={{ maxHeight: 200, overflow: "auto" }}>
                  {history.map(function(h, i) {
                    var isE2 = !!expHistory[i]; var isBon = h.event.termDef.startsWith("\u2605");
                    return <div key={i} style={{ borderBottom: i < history.length - 1 ? "1px solid var(--border)" : "none" }}>
                      <button onClick={function() { setExpHistory(function(p) { var o = Object.assign({}, p); o[i] = !o[i]; return o; }); }} style={{ width: "100%", padding: "5px 2px", background: "transparent", border: "none", cursor: "pointer", textAlign: "left", color: "var(--text)", display: "flex", justifyContent: "space-between" }}>
                        <span style={{ fontSize: 11, fontFamily: "var(--sans)" }}><span style={{ fontFamily: "var(--mono)", fontSize: 9, color: "var(--dim)" }}>{h.event.year}{" "}</span>{h.event.title.replace(" \u2605", "")}</span>

                      </button>
                      {isE2 && <div style={{ padding: "4px 8px 8px", fontSize: 11, fontFamily: "var(--sans)", lineHeight: 1.4, background: isBon ? "rgba(218,165,32,0.03)" : "rgba(91,117,83,0.03)", borderRadius: 3 }}>
