              <div style={{ padding: 10, background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 8 }}><AchPanel achievements={achievements} /></div>
              <div style={{ padding: 10, background: "rgba(181,68,68,0.05)", border: "1px solid rgba(181,68,68,0.15)", borderRadius: 8 }}>
                <Btn onClick={function() { setCampaignLevel(null); setGameOver("abandoned"); }} style={{ width: "100%", background: "rgba(181,68,68,0.1)", color: "#ff6666", border: "1px solid rgba(181,68,68,0.2)", fontWeight: 700, padding: "8px" }}>Abandon Run</Btn>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }
  // ══ SCREEN: EXPERIMENTAL ══
  if (screen === "experimental") return (
    <div style={base}>{fonts}{popupEl}{helpEl}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 10, letterSpacing: 6, textTransform: "uppercase", color: "#4A7FB5", fontFamily: "var(--mono)", marginBottom: 16 }}>Commander in Chief</div>
        <h2 style={{ fontSize: 24, fontWeight: 700, margin: "0 0 8px 0" }}>Experimental Modes</h2>
        <p style={{ fontSize: 13, color: "var(--dim)", fontFamily: "var(--sans)", maxWidth: 380, lineHeight: 1.5, marginBottom: 24 }}>New ways to learn and play.</p>
        <div style={{ width: "100%", maxWidth: 380, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ position: "relative" }}>
            <button onClick={initFlashCards} style={{ width: "100%", padding: "20px 16px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", textAlign: "left", color: "var(--text)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 28 }}>{"📝"}</span>
                <div>
                  <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 700 }}>Flash Cards</div>
                  <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "var(--dim)", marginTop: 2 }}>Match terms to definitions. 15s timer.</div>
                </div>
              </div>
            </button>
            <button onClick={function(e) { e.stopPropagation(); setHelpScreen("flashcards"); }} style={{ position: "absolute", top: 10, right: 10, width: 24, height: 24, borderRadius: "50%", background: "rgba(74,127,181,0.1)", border: "1px solid rgba(74,127,181,0.25)", color: "#4A7FB5", fontSize: 12, fontWeight: 700, fontFamily: "var(--serif)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>?</button>
          </div>
          <div style={{ position: "relative" }}>
            <button onClick={function() { setScreen("campaign_map"); }} style={{ width: "100%", padding: "20px 16px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, cursor: "pointer", textAlign: "left", color: "var(--text)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 28 }}>{"\u{1F5FA}\uFE0F"}</span>
                <div>
                  <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 700 }}>Campaign</div>
                  <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "var(--dim)", marginTop: 2 }}>6 themed levels on a world map.</div>
                </div>
              </div>
            </button>
            <button onClick={function(e) { e.stopPropagation(); setHelpScreen("campaign"); }} style={{ position: "absolute", top: 10, right: 10, width: 24, height: 24, borderRadius: "50%", background: "rgba(74,127,181,0.1)", border: "1px solid rgba(74,127,181,0.25)", color: "#4A7FB5", fontSize: 12, fontWeight: 700, fontFamily: "var(--serif)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>?</button>
          </div>
          <div style={{ position: "relative" }}>
            <button onClick={function() { setPlayerName(nameInput || "Mr. President"); initVersus(); }} style={{ width: "100%", padding: "20px 16px", background: "rgba(181,68,68,0.06)", border: "1px solid rgba(181,68,68,0.2)", borderRadius: 8, cursor: "pointer", textAlign: "left", color: "var(--text)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <span style={{ fontSize: 28 }}>{"\u2694\uFE0F"}</span>
                <div>
                  <div style={{ fontSize: 16, fontFamily: "var(--serif)", fontWeight: 700 }}>Versus Mode</div>
                  <div style={{ fontSize: 12, fontFamily: "var(--sans)", color: "var(--dim)", marginTop: 2 }}>Bankrupt an AI opponent. 30 rounds. Normal difficulty.</div>
                </div>
              </div>
            </button>
            <button onClick={function(e) { e.stopPropagation(); setHelpScreen("versus"); }} style={{ position: "absolute", top: 10, right: 10, width: 24, height: 24, borderRadius: "50%", background: "rgba(74,127,181,0.1)", border: "1px solid rgba(74,127,181,0.25)", color: "#4A7FB5", fontSize: 12, fontWeight: 700, fontFamily: "var(--serif)", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>?</button>
          </div>
        </div>
        <Btn onClick={function() { setScreen("title"); }} style={{ marginTop: 24, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Back</Btn>
      </div>
    </div>
  );

  // ══ SCREEN: FLASH CARDS ══
  if (screen === "flashcards") {
    if (fcDone || fcCards.length === 0) {
      var fpct = fcCards.length > 0 ? Math.round(fcScore / fcCards.length * 100) : 0;
      return (
        <div style={base}>{fonts}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24, textAlign: "center" }}>
            <div style={{ fontSize: 56, fontWeight: 800, color: fpct >= 90 ? "#DAA520" : fpct >= 70 ? "#5B8C5A" : "#B54444" }}>{String(fcScore) + "/" + String(fcCards.length)}</div>
            <p style={{ fontSize: 14, color: "var(--dim)", fontFamily: "var(--sans)", margin: "8px 0 24px" }}>{fpct >= 90 ? "Excellent!" : fpct >= 70 ? "Good!" : "Keep studying!"}</p>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={function() { setScreen("experimental"); }} style={{ background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Back</Btn>
              <Btn onClick={initFlashCards} style={{ background: "#4A7FB5", color: "#f0e8d8" }}>Retry</Btn>
            </div>
          </div>
        </div>
      );
    }
    var fc = fcCards[fcIdx];
    if (!fc) return null;
    var fcRev = fcAnswered !== null;
    return (
      <div style={base}>{fonts}{helpEl}
        <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: 24 }}>
          <HelpBtn mode="flashcards" />
          <div style={{ width: "100%", maxWidth: 460 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
              <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: "var(--dim)" }}>{"Card " + String(fcIdx + 1) + "/" + String(fcCards.length)}</span>
              <span style={{ fontSize: 10, fontFamily: "var(--mono)", color: "#5B8C5A" }}>{"Score: " + String(fcScore)}</span>
              <span style={{ fontSize: 14, fontFamily: "var(--mono)", fontWeight: 700, color: fcTimer <= 5 ? "#B54444" : fcTimer <= 10 ? "#DAA520" : "var(--text)" }}>{String(fcTimer) + "s"}</span>
            </div>
            <div style={{ width: "100%", height: 3, background: "#2a2920", borderRadius: 2, marginBottom: 16, overflow: "hidden" }}>
              <div style={{ height: "100%", width: String(Math.round(fcTimer / 15 * 100)) + "%", background: fcTimer <= 5 ? "#B54444" : fcTimer <= 10 ? "#DAA520" : "#5B7553", borderRadius: 2, transition: "width 1s linear" }} />
            </div>
            <div style={{ padding: "20px 16px", background: "var(--card)", border: "1px solid var(--border)", borderRadius: 8, marginBottom: 16, textAlign: "center" }}>
              <div style={{ fontSize: 10, fontFamily: "var(--mono)", textTransform: "uppercase", letterSpacing: 2, color: "#4A7FB5", marginBottom: 8 }}>{fc.askT ? "What does this term mean?" : "What term is this?"}</div>
              <div style={{ fontSize: 17, fontFamily: "var(--serif)", fontWeight: 700, lineHeight: 1.4 }}>{fc.q}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {fc.opts.map(function(opt, oi) {
                var isCor = opt === fc.a;
                var isCh = fcAnswered === opt;
                var bg = "var(--card)"; var bd = "var(--border)";
                if (fcRev && isCor) { bg = "rgba(91,140,90,0.15)"; bd = "rgba(91,140,90,0.5)"; }
                if (fcRev && isCh && !isCor) { bg = "rgba(181,68,68,0.15)"; bd = "rgba(181,68,68,0.5)"; }
                return (
                  <button key={oi} onClick={function() { fcAnswer(opt); }} disabled={fcRev} style={{ padding: "12px 14px", background: bg, border: "1px solid " + bd, borderRadius: 6, color: "var(--text)", fontFamily: "var(--sans)", fontSize: 14, lineHeight: 1.4, textAlign: "left", cursor: fcRev ? "default" : "pointer" }}>
                    {["A. ", "B. ", "C. "][oi] + opt + (fcRev && isCor ? " \u2713" : "") + (fcRev && isCh && !isCor ? " \u2717" : "")}
                  </button>
                );
              })}
            </div>
            {fcAnswered === "__timeout__" && <div style={{ textAlign: "center", marginTop: 10, fontSize: 13, color: "#B54444", fontWeight: 700 }}>{"Time's up!"}</div>}
            {fcRev && <Btn onClick={fcNext} style={{ width: "100%", marginTop: 12, background: "#4A7FB5", color: "#f0e8d8" }}>{fcIdx + 1 >= fcCards.length ? "Results" : "Next"}</Btn>}
            <Btn onClick={function() { if (fcTimerRef.current) { clearInterval(fcTimerRef.current); fcTimerRef.current = null; } setFcDone(true); }} style={{ width: "100%", marginTop: 8, background: "transparent", color: "rgba(181,68,68,0.6)", border: "1px solid rgba(181,68,68,0.2)", padding: "8px", fontSize: 10 }}>Abandon</Btn>
          </div>
        </div>
      </div>
    );
  }

  // ══ SCREEN: CAMPAIGN MAP ══
  if (screen === "campaign_map") return (
    <div style={base}>{fonts}{popupEl}{helpEl}
      <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", minHeight: "100vh", padding: 24 }}>
        <HelpBtn mode="campaign" />
        <h2 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 4px 0" }}>Campaign</h2>
        <p style={{ fontSize: 11, fontFamily: "var(--sans)", color: "var(--dim)", margin: "0 0 16px 0" }}>Complete missions across the globe</p>
        <div style={{ width: "100%", maxWidth: 560, position: "relative", background: "linear-gradient(180deg, #0d1520 0%, #111a14 50%, #0d1520 100%)", borderRadius: 12, border: "1px solid var(--border)", overflow: "hidden" }}>
          <svg viewBox="0 0 1000 500" style={{ width: "100%", display: "block" }} xmlns="http://www.w3.org/2000/svg">
            {/* Ocean grid lines */}
            {[100,200,300,400,500,600,700,800,900].map(function(x) { return <line key={"gx"+x} x1={x} y1={0} x2={x} y2={500} stroke="rgba(74,127,181,0.06)" strokeWidth="0.5" />; })}
            {[100,200,300,400].map(function(y) { return <line key={"gy"+y} x1={0} y1={y} x2={1000} y2={y} stroke="rgba(74,127,181,0.06)" strokeWidth="0.5" />; })}
            {/* Simplified world map continents */}
            {/* North America */}
            <path d="M120,60 L160,55 L200,65 L240,60 L280,70 L290,90 L285,120 L270,140 L260,160 L270,180 L265,200 L250,210 L230,195 L215,200 L200,215 L185,230 L170,225 L160,210 L155,190 L165,170 L170,150 L155,130 L140,120 L130,100 L120,80 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* South America */}
            <path d="M220,250 L250,240 L275,250 L290,270 L305,300 L310,330 L305,360 L295,385 L280,400 L265,410 L250,420 L240,410 L235,390 L240,370 L245,350 L240,330 L230,310 L220,290 L215,270 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* Europe */}
            <path d="M440,60 L460,55 L480,60 L510,55 L530,65 L545,80 L550,100 L540,115 L525,125 L510,130 L495,140 L480,145 L465,140 L450,130 L440,120 L435,100 L440,80 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* Africa */}
            <path d="M460,165 L490,155 L520,160 L545,170 L560,190 L565,220 L560,260 L550,300 L535,330 L515,350 L495,355 L480,345 L470,320 L465,290 L460,260 L455,230 L450,200 L455,180 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* Asia */}
            <path d="M560,50 L600,45 L650,50 L700,55 L740,60 L780,70 L810,85 L820,110 L810,140 L790,160 L770,175 L740,180 L710,175 L680,170 L650,160 L620,150 L595,140 L575,125 L560,110 L555,85 L560,65 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* Australia */}
            <path d="M770,310 L810,300 L850,305 L880,320 L885,345 L875,370 L855,385 L830,390 L800,385 L780,370 L770,345 L768,325 Z" fill="rgba(91,117,83,0.12)" stroke="rgba(91,117,83,0.25)" strokeWidth="1" />
            {/* Japan/Islands */}
            <path d="M835,100 L845,90 L850,105 L845,120 L835,115 Z" fill="rgba(91,117,83,0.1)" stroke="rgba(91,117,83,0.2)" strokeWidth="0.8" />
            {/* Connection lines between levels */}
            {CAMPAIGN_LEVELS.slice(0, -1).map(function(lv, li) {
              var nx = CAMPAIGN_LEVELS[li + 1];
              return <line key={li} x1={lv.mapX * 10} y1={lv.mapY * 5} x2={nx.mapX * 10} y2={nx.mapY * 5} stroke={campaignCompleted[lv.id] ? "rgba(91,140,90,0.5)" : "rgba(90,85,72,0.25)"} strokeWidth={campaignCompleted[lv.id] ? "2" : "1"} strokeDasharray={campaignCompleted[lv.id] ? "0" : "6 4"} />;
            })}
            {/* Level nodes */}
            {CAMPAIGN_LEVELS.map(function(lv) {
              var ok = canPlayLvl(lv.id); var dn = !!campaignCompleted[lv.id];
              var cl = dn ? "#5B8C5A" : ok ? CMP_COL[lv.diff] : "#5a5548";
              var cx = lv.mapX * 10; var cy = lv.mapY * 5;
              return <g key={lv.id} style={{ cursor: ok ? "pointer" : "not-allowed", opacity: ok ? 1 : 0.4 }} onClick={function() { if (ok) { setPlayerName(nameInput || "Mr. President"); startCampaign(lv); } }}>
                {ok && !dn && <circle cx={cx} cy={cy} r={28} fill="none" stroke={cl} strokeWidth="1" opacity="0.3">
                  <animate attributeName="r" values="22;30;22" dur="2.5s" repeatCount="indefinite" />
                  <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite" />
                </circle>}
                {dn && <circle cx={cx} cy={cy} r={26} fill="none" stroke="#5B8C5A" strokeWidth="1" opacity="0.2" />}
                <circle cx={cx} cy={cy} r={20} fill="rgba(13,18,16,0.85)" stroke={cl} strokeWidth="2.5" />
                <text x={cx} y={cy + 1} textAnchor="middle" dominantBaseline="central" fill={cl} fontSize="14" fontWeight="700" fontFamily="monospace">{dn ? "\u2713" : String(lv.id)}</text>
                <text x={cx} y={cy + 34} textAnchor="middle" fill={ok ? "rgba(224,216,200,0.7)" : "rgba(138,128,112,0.4)"} fontSize="10" fontFamily="sans-serif" fontWeight="600">{lv.name}</text>
              </g>;
            })}
          </svg>
        </div>
        <div style={{ width: "100%", maxWidth: 560, display: "flex", flexDirection: "column", gap: 6, marginTop: 16 }}>
          {CAMPAIGN_LEVELS.map(function(lv) {
            var ok = canPlayLvl(lv.id); var dn = !!campaignCompleted[lv.id];
            return <button key={lv.id} onClick={function() { if (ok) { setPlayerName(nameInput || "Mr. President"); startCampaign(lv); } }} disabled={!ok} style={{
              padding: "10px 14px", background: dn ? "rgba(91,117,83,0.08)" : "var(--card)",
              border: "1px solid " + (dn ? "rgba(91,117,83,0.3)" : ok ? "var(--border)" : "#1a1915"),
              borderRadius: 6, cursor: ok ? "pointer" : "not-allowed", textAlign: "left", color: "var(--text)",
              opacity: ok ? 1 : 0.4, display: "flex", alignItems: "center", gap: 10
            }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: "rgba(0,0,0,0.3)", border: "2px solid " + CMP_COL[lv.diff], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, fontFamily: "var(--mono)", color: CMP_COL[lv.diff], flexShrink: 0 }}>
                {dn ? "\u2713" : String(lv.id)}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontFamily: "var(--serif)", fontWeight: 600 }}>{lv.name}</div>
                <div style={{ fontSize: 11, fontFamily: "var(--sans)", color: "var(--dim)" }}>
                  {lv.desc + " - "}
                  <span style={{ color: CMP_COL[lv.diff], fontFamily: "var(--mono)", fontSize: 10 }}>{lv.diff.toUpperCase()}</span>
                  {" - " + String(lv.eventIds.length) + " events"}
                </div>
              </div>
              {dn && <span style={{ color: "#5B8C5A" }}>{"\u2705"}</span>}
              {!ok && <span style={{ color: "var(--dim)" }}>{"\u{1F512}"}</span>}
            </button>;
          })}
        </div>
        <Btn onClick={function() { setScreen("experimental"); }} style={{ marginTop: 16, background: "transparent", color: "var(--dim)", border: "1px solid var(--border)" }}>Back</Btn>
      </div>
    </div>
  );

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
